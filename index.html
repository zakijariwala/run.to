<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>run.to | Open Engine</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Tailwind CSS (CDN for zero-build) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg)',
                        panel: 'var(--panel)',
                        accent: 'var(--accent)',
                        border: 'var(--border)',
                        text: 'var(--text)',
                        'text-dim': 'var(--text-dim)'
                    },
                    fontFamily: {
                        sans: ['var(--font-sans)', 'Inter', 'system-ui', 'sans-serif'],
                        mono: ['var(--font-mono)', 'JetBrains Mono', 'monospace'],
                        hud: ['var(--font-hud)', 'Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-bg text-text font-sans h-[100dvh] flex flex-col overflow-hidden selection:bg-accent selection:text-black">
    
    <!-- Header -->
    <header class="h-16 md:h-20 border-b border-border flex items-center justify-between px-4 md:px-6 z-30">
        <div class="flex items-center gap-4">
            <div id="app-logo" class="hud-logo">
                run.to
            </div>
            <select id="theme-select" class="uppercase tracking-widest outline-none focus:border-accent transition-colors cursor-pointer">
                <option value="run.to">run.to</option>
                <option value="stone.to">stone.to</option>
                <option value="cyber.to">cyber.to</option>
                <option value="steam.to">steam.to</option>
                <option value="pastel.to">pastel.to</option>
                <option value="void.to">void.to</option>
                <option value="neon.to">neon.to</option>
                <option value="retro.to">retro.to</option>
                <option value="paper.to">paper.to</option>
                <option value="glass.to">glass.to</option>
                <option value="moss.to">moss.to</option>
                <option value="blood.to">blood.to</option>
                <option value="gold.to">gold.to</option>
            </select>
            <button id="btn-theme-toggle" class="p-2 border border-border text-text-dim hover:text-accent transition-all btn-push rounded-md">
                <i data-lucide="moon" class="w-4 h-4" id="theme-toggle-icon"></i>
            </button>
        </div>
        <div class="flex items-center gap-2">
            <span class="flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <span id="status-text" class="hud-label">Sky Talker OK</span>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden flex flex-col md:flex-row">
        <!-- Control Unit (Sidebar) -->
        <aside id="bottom-sheet" class="absolute bottom-0 left-0 right-0 max-h-[75vh] md:max-h-none md:relative w-full md:w-96 md:flex-none border-t md:border-t-0 md:border-r border-border flex flex-col bg-bg z-20 transition-transform duration-300 ease-out translate-y-0">
            <!-- Drag Handle Area -->
            <div id="drag-handle" class="w-full pt-4 pb-2 flex justify-center md:hidden touch-pan-y cursor-pointer bg-bg border-b border-border">
                <div class="w-12 h-1.5 bg-border"></div>
            </div>
            <div class="flex-1 overflow-y-auto px-5 pb-5 md:p-8 space-y-8 md:space-y-12">
                
                <!-- Input Mode Toggle -->
                <div class="flex mode-toggle-container mb-4">
                    <button id="mode-distance" class="flex-1 active-tab">How Far</button>
                    <button id="mode-time" class="flex-1">How Long</button>
                </div>

                <!-- Target Input -->
                <section class="space-y-6">
                    <label class="hud-label flex items-center gap-2">
                        <i data-lucide="target" class="w-3 h-3 text-accent"></i> <span id="input-label">Hunt Size</span>
                    </label>
                    
                    <div id="dial-container" class="dial-container">
                        <div class="dial-value" id="input-display">5.0</div>
                        <span class="hud-label-unit" id="input-unit">km</span>
                    </div>
                    
                    <input type="range" id="input-slider" min="1" max="20" step="0.5" value="5" class="w-full">
                    
                    <!-- Start Location Toggle -->
                    <div class="pt-4 flex items-center justify-between">
                        <label for="toggle-nearby" class="hud-toggle-label flex items-center gap-2 cursor-pointer">
                            <i data-lucide="map-pin" class="w-3 h-3 text-accent"></i> Start at Cave
                        </label>
                        <label class="relative inline-flex items-center cursor-pointer" id="toggle-nearby-container">
                            <input type="checkbox" id="toggle-nearby" class="sr-only peer" checked>
                            <div class="thumb"></div>
                        </label>
                    </div>
                </section>

                <!-- Results Section -->
                <section id="results-section" class="space-y-4 hidden">
                    <label class="hud-label flex items-center gap-2">
                        <i data-lucide="map" class="w-3 h-3 text-accent"></i> Path Found
                    </label>
                    
                    <div class="space-y-4 results-stack">
                        <div class="bg-panel animate-entry" style="--stagger: 0">
                            <div class="grid grid-cols-2 gap-8">
                                <div class="data-block">
                                    <div class="telemetry-header mb-2">Length</div>
                                    <div class="data-readout-gauge" id="result-distance">-- <span class="data-unit-suffix">km</span></div>
                                </div>
                                <div class="data-block">
                                    <div class="telemetry-header mb-2">Speed</div>
                                    <div class="data-readout-gauge" id="result-time">-- <span class="data-unit-suffix">m</span></div>
                                </div>
                            </div>
                        </div>

                        <div id="splits-container" class="bg-panel animate-entry" style="--stagger: 1">
                            <div class="telemetry-header mb-4 flex items-center gap-1">
                                <i data-lucide="timer" class="w-3 h-3 text-accent"></i> Telemetry
                            </div>
                            <div id="splits-list" class="space-y-0"></div>
                        </div>

                        <div class="bg-panel animate-entry" style="--stagger: 2">
                            <div class="telemetry-header mb-4 flex items-center gap-1">
                                <i data-lucide="map-pin" class="w-3 h-3 text-emerald-400"></i> Rest Rocks
                            </div>
                            <a id="btn-google-maps" href="#" target="_blank" class="w-full py-4 bg-panel border border-border text-text font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-border transition-all btn-push">
                                Show Big Map
                            </a>
                        </div>
                    </div>
                </section>

            </div>

            <!-- Action Area -->
            <div class="p-6 md:p-8 border-t border-border bg-bg">
                <button id="btn-generate" class="w-full py-6 bg-accent text-bg font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-3">
                    <i data-lucide="play" class="w-5 h-5"></i> Find Loop
                </button>
            </div>
        </aside>

        <!-- Main Map Area -->
        <section class="absolute inset-0 md:relative md:flex-1 bg-[#000000] z-10">
            <!-- Leaflet Target -->
            <div id="map" class="absolute inset-0 z-10"></div>
            
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="absolute inset-0 bg-bg z-20 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
                <div class="w-16 h-16 border-4 border-border border-t-accent animate-spin"></div>
                <div class="mt-6 hud-label text-accent animate-pulse">Thinking...</div>
            </div>
        </section>
    </main>

    <!-- Location Permission Blocker -->
    <div id="location-blocker" class="fixed inset-0 bg-bg z-50 flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="bg-panel border border-border p-8 max-w-sm w-full flex flex-col items-center gap-6 btn-push">
            <div class="w-20 h-20 bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-500 mb-2 rounded-full">
                <i data-lucide="map-pin-off" class="w-10 h-10"></i>
            </div>
            <h2 class="hud-title text-2xl">Where Cave?</h2>
            <p class="text-sm text-text-dim leading-relaxed">
                Need know where you are. Cannot find path without your spot.
            </p>
            <button id="btn-retry-location" class="w-full py-5 bg-accent text-bg font-bold uppercase tracking-widest transition-all btn-push flex items-center justify-center gap-3">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i> Try Again
            </button>
            <button id="btn-skip-location" class="w-full py-3 text-text-dim text-[10px] font-bold uppercase tracking-widest border border-border flex items-center justify-center transition-all btn-push mt-2">
                Go Anyway
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Application Scripts -->
    <script src="js/routeEngine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
